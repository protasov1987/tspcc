 /><text x="854" y="828" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" fill="#4f6280" text-anchor="start">конфликтный manual</text><rect x="1050" y="816" width="22" height="14" fill="#facc15" stroke="#ca8a04" stroke-width="2" rx="4" /><text x="1084" y="828" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" fill="#4f6280" text-anchor="start">операция «Мушка»</text><text x="80" y="894" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" fill="#5b6f90" text-anchor="start">Потоки для этой МК по правилам автоплана: изделия 005 → 010 → 015; ОК 020 → 025; ОС в маршруте отсутствуют.</text><text x="80" y="920" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" fill="#5b6f90" text-anchor="start">Цвет стрелки всегда совпадает с типом потока, который передаётся на следующую операцию.</text><text x="80" y="946" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" fill="#5b6f90" text-anchor="start">Если в другой МК появится операция «Мушка», она должна отображаться жёлтым цветом; в этой карте такой операции нет.</text></svg>